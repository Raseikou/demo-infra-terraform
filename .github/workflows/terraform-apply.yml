name: "Terraform Apply (Main Branch)"

on:
  push:
    branches:
      - main
    paths:
      - "practice-06/**"

permissions:
  contents: read
  pull-requests: read

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: 1.5.0

# 同じ state を同時に更新しないよう、apply は常に直列化する
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  preflight:
    name: "Check Backend Configuration"
    runs-on: ubuntu-latest
    outputs:
      backend_ready: ${{ steps.check.outputs.backend_ready }}

    steps:
      - name: Verify required repository variables
        id: check
        shell: bash
        run: |
          # backend 情報が揃っていない場合は plan/apply に進ませない
          missing_vars=()

          [ -n "${{ vars.TF_STATE_BUCKET }}" ] || missing_vars+=("TF_STATE_BUCKET")
          [ -n "${{ vars.TF_LOCK_TABLE }}" ] || missing_vars+=("TF_LOCK_TABLE")
          [ -n "${{ vars.TF_STATE_KMS_KEY_ARN }}" ] || missing_vars+=("TF_STATE_KMS_KEY_ARN")

          if [ ${#missing_vars[@]} -eq 0 ]; then
            echo "backend_ready=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Backend configuration check"
              echo ""
              echo "Backend repository variables are configured. Terraform apply can proceed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "backend_ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Backend configuration check"
              echo ""
              echo "Terraform apply is skipped because backend setup is not finished."
              echo ""
              echo "Missing repository variables:"
              for var_name in "${missing_vars[@]}"; do
                echo "- \`$var_name\`"
              done
              echo ""
              echo "Run \`Backend Setup (One-Time Initialization)\` on \`main\`, then add the outputs as repository variables."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  plan:
    name: "Terraform Plan for Apply"
    needs: preflight
    if: needs.preflight.outputs.backend_ready == 'true'
    runs-on: ubuntu-latest
    outputs:
      plan_files: ${{ steps.plan.outputs.files }}
    strategy:
      matrix:
        terraform-dir: [practice-06]
      max-parallel: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Format Check - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform fmt -check -recursive
      - name: "Terraform Init - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          # practice-06 用の backend 値は CI 実行時に注入する
          terraform init -no-color \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="kms_key_id=${{ vars.TF_STATE_KMS_KEY_ARN }}" \
            -backend-config="region=${{ env.AWS_REGION }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: "Terraform Validate - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform validate -no-color

      - name: "Terraform Plan - ${{ matrix.terraform-dir }}"
        id: plan
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform plan -no-color -out=tfplan
          terraform show -json tfplan > tfplan.json
          echo "files=${{ matrix.terraform-dir }}" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          # apply フェーズでは同じ plan を再利用する
          name: tfplan-${{ matrix.terraform-dir }}
          path: |
            ${{ matrix.terraform-dir }}/tfplan
            ${{ matrix.terraform-dir }}/tfplan.json
          retention-days: 1

  approval:
    name: "Manual Approval Required"
    needs: plan
    if: needs.plan.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: "Approval Information"
        run: |
          echo "✅ All Terraform plans generated successfully"
          echo "Review the artifacts in the workflow run to see the planned changes"
          echo "This workflow requires manual approval to proceed with apply"

  apply:
    name: "Terraform Apply"
    needs: [preflight, plan, approval]
    runs-on: ubuntu-latest
    if: needs.preflight.outputs.backend_ready == 'true' && success()
    strategy:
      matrix:
        terraform-dir: [practice-06]
      max-parallel: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.terraform-dir }}
          path: ${{ matrix.terraform-dir }}/
      - name: "Terraform Init - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          # apply 側でも同じ backend 設定で初期化し直す
          terraform init -no-color \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="kms_key_id=${{ vars.TF_STATE_KMS_KEY_ARN }}" \
            -backend-config="region=${{ env.AWS_REGION }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: "Terraform Apply - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform apply -auto-approve -no-color tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: "Terraform Output - ${{ matrix.terraform-dir }}"
        run: |
          cd ${{ matrix.terraform-dir }}
          echo "## Terraform Outputs for ${{ matrix.terraform-dir }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}

  notify:
    name: "Notify on Status"
    needs: [preflight, apply]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Final Status"
        run: |
          if [ "${{ needs.preflight.outputs.backend_ready }}" != "true" ]; then
            echo "ℹ️ Terraform apply was skipped because backend configuration is not ready yet."
          elif [ "${{ needs.apply.result }}" == "success" ]; then
            echo "✅ Terraform apply completed successfully!"
          else
            echo "❌ Terraform apply failed!"
            exit 1
          fi
